name: app
description: "Contacts App with Syncthing Backup"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  ffi: ^2.2.0
  path_provider: ^2.1.5
  path: ^1.9.1
  intl: ^0.20.2
  file_picker: ^8.1.7
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  flutter_local_notifications: ^21.0.0
  flutter_background_service: ^5.1.0
  flutter_background_service_android: ^6.3.1
  permission_handler: ^12.0.1

  # Material You / M3 dynamic color
  dynamic_color: ^1.7.0

  # Premium typography
  google_fonts: ^6.2.1

  # Audio - DTMF tones
  audioplayers: ^6.1.0

  # Haptic feedback
  vibration: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "app_icon"
  ios: false
  image_path: "assets/app_icon.png" # Fallback
  adaptive_icon_background: "#FFFFFF" # White background
  adaptive_icon_foreground: "assets/app_icon_foreground.png" # Transparent leaf foreground
  min_sdk_android: 21
